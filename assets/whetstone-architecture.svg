<svg viewBox="0 0 1000 720" width="1000" height="720" role="img" xmlns="http://www.w3.org/2000/svg">
<title>whetstone — the whole stack</title>
<desc>The whetstone architecture as a stack of layers, all under one code-owned gate. From the top: an intake and launcher that routes a request and blocks without a cost ceiling; an alpha dynamic control plane (converge) with a global held-out truth gate and a human-accepted replan; an experimental whole-repo scope loop with git-backed keep-best and the Forge per-file verifier learner; the stable single-objective inner loop (baseline, act, observe and score, keep-best, gate, with five verdicts where only running loops back); and a cross-cutting scorers and isolation layer that produces the 0 to 100 number the gate reads. The gate weakens as scope widens; two seats stay human.</desc>
<defs>
  <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="#88C0D0"/></marker>
  <marker id="ag" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="#A3BE8C"/></marker>
</defs>
<rect x="6" y="6" width="988" height="708" rx="22" fill="#2E3440" stroke="#434C5E" stroke-width="1.5"/>
<g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <text x="34" y="46" font-size="24" font-weight="700" fill="#ECEFF4">whetstone — the whole stack</text>
  <text x="34" y="69" font-size="12.5" fill="#9AA5B8">code owns the gate at every layer · the gate weakens as scope widens · two seats stay human</text>

  <rect x="556" y="33" width="12" height="12" rx="3" fill="#81A1C1"/><text x="573" y="43" font-size="11" fill="#D8DEE9">CODE</text>
  <rect x="620" y="33" width="12" height="12" rx="3" fill="#EBCB8B"/><text x="637" y="43" font-size="11" fill="#D8DEE9">MODEL</text>
  <rect x="690" y="33" width="12" height="12" rx="3" fill="#A3BE8C"/><text x="707" y="43" font-size="11" fill="#D8DEE9">SCORER</text>
  <rect x="766" y="33" width="12" height="12" rx="3" fill="#B48EAD"/><text x="783" y="43" font-size="11" fill="#D8DEE9">HUMAN</text>
  <text x="556" y="66" font-size="10.5" fill="#6E7686">border = maturity:</text>
  <text x="652" y="66" font-size="10.5" fill="#A3BE8C">stable</text>
  <text x="694" y="66" font-size="10.5" fill="#EBCB8B">experimental</text>
  <text x="772" y="66" font-size="10.5" fill="#D08770">alpha</text>

  <!-- left spine: code owns the gate -->
  <rect x="20" y="100" width="6" height="532" rx="3" fill="#81A1C1" opacity="0.45"/>
  <text transform="rotate(-90 44 366)" x="44" y="366" text-anchor="middle" font-size="10.5" font-weight="700" fill="#81A1C1" letter-spacing="2.5">CODE OWNS THE GATE</text>

  <!-- right gutter: scope axis -->
  <text transform="rotate(90 958 366)" x="958" y="366" text-anchor="middle" font-size="10" fill="#6E7686" letter-spacing="1">scope widens ↑   ·   gate stronger ↓</text>

  <!-- ===== INTAKE & LAUNCHER ===== -->
  <rect x="68" y="100" width="852" height="80" rx="11" fill="#3B4252" stroke="#4C566A" stroke-width="1.3"/>
  <text x="86" y="123" font-size="14.5" font-weight="700" fill="#ECEFF4">INTAKE &amp; LAUNCHER</text>
  <text x="240" y="123" font-size="10.5" fill="#6E7686">entry · backend-agnostic</text>
  <circle cx="92" cy="141" r="4.5" fill="#B48EAD"/><text x="103" y="145" font-size="11" fill="#CED4DE">/whetstone:whet — guided launcher · 5 questions · shows worst-case cost · won't start without a cost ceiling</text>
  <circle cx="92" cy="159" r="4.5" fill="#81A1C1"/><text x="103" y="163" font-size="11" fill="#CED4DE">whet.mjs router →  --artifact ▸ driver    ·    --scope ▸ scope    ·    --objectives ▸ converge</text>
  <text x="555" y="163" font-size="11" fill="#9AA5B8">act backend = headless claude -p (own quota, cron-safe) · Workflow tool = optional attended act</text>

  <!-- ===== ALPHA · DYNAMIC CONTROL PLANE ===== -->
  <rect x="68" y="190" width="852" height="106" rx="11" fill="#363D4A" stroke="#D08770" stroke-width="1.3" stroke-dasharray="6 3"/>
  <text x="86" y="213" font-size="14.5" font-weight="700" fill="#ECEFF4">DYNAMIC CONTROL PLANE</text>
  <text x="300" y="213" font-size="11" fill="#9AA5B8">whetstone-converge — multi-objective</text>
  <rect x="836" y="199" width="72" height="17" rx="5" fill="none" stroke="#D08770" stroke-width="1"/><text x="872" y="211" font-size="10" fill="#D08770" text-anchor="middle">ALPHA</text>
  <circle cx="92" cy="234" r="4.5" fill="#81A1C1"/><text x="103" y="238" font-size="11" fill="#CED4DE">globalVerdict = AND of every objective MET (never min) · mandatory deterministic floor</text>
  <circle cx="92" cy="252" r="4.5" fill="#81A1C1"/><text x="103" y="256" font-size="11" fill="#CED4DE">tournament  --candidates K  → winner picked on the HELD-OUT signal · winner's-curse guard</text>
  <circle cx="92" cy="270" r="4.5" fill="#B48EAD"/><text x="103" y="274" font-size="11" fill="#CED4DE">global held-out truth: user-authored · SHA-pinned · immutable · outside every editScope</text>
  <circle cx="92" cy="288" r="4.5" fill="#B48EAD"/><text x="103" y="292" font-size="11" fill="#CED4DE">--parallel batched fan-out (N objectives → 1 gated round) · diagnostics (advisory) · replan = proposer-only, human accepts</text>

  <!-- ===== EXPERIMENTAL · SCOPE + FORGE ===== -->
  <rect x="68" y="306" width="852" height="94" rx="11" fill="#363D4A" stroke="#EBCB8B" stroke-width="1.3"/>
  <text x="86" y="329" font-size="14.5" font-weight="700" fill="#ECEFF4">WHOLE-REPO SCOPE LOOP</text>
  <text x="290" y="329" font-size="11" fill="#9AA5B8">whetstone-scope — same gate, a whole --scope dir</text>
  <rect x="800" y="315" width="108" height="17" rx="5" fill="none" stroke="#EBCB8B" stroke-width="1"/><text x="854" y="327" font-size="10" fill="#EBCB8B" text-anchor="middle">EXPERIMENTAL</text>
  <circle cx="92" cy="350" r="4.5" fill="#81A1C1"/><text x="103" y="354" font-size="11" fill="#CED4DE">git = keep-best (commit per pass · reset --hard rollback) · requires a clean git repo · refuses a dirty tree</text>
  <circle cx="92" cy="368" r="4.5" fill="#81A1C1"/><text x="103" y="372" font-size="11" fill="#CED4DE">--read-only fence hard-reverted each pass (editor can't weaken its own gate) · held-out confirm from a clean worktree</text>
  <circle cx="92" cy="386" r="4.5" fill="#A3BE8C"/><text x="103" y="390" font-size="11" fill="#CED4DE">Forge: on a confirm-veto, learns a per-file verifier — oracle corroboration · mutation-admit · exploit-regression · auto-flaky retire</text>

  <!-- ===== STABLE · INNER LOOP (the core) ===== -->
  <rect x="68" y="410" width="852" height="120" rx="11" fill="#3B4252" stroke="#A3BE8C" stroke-width="2"/>
  <text x="86" y="433" font-size="14.5" font-weight="700" fill="#ECEFF4">SINGLE-OBJECTIVE INNER LOOP</text>
  <text x="318" y="433" font-size="11" fill="#9AA5B8">whetstone (driver.mjs) — the core</text>
  <rect x="772" y="419" width="136" height="17" rx="5" fill="none" stroke="#A3BE8C" stroke-width="1"/><text x="840" y="431" font-size="10" fill="#A3BE8C" text-anchor="middle">STABLE · the supported v1</text>

  <!-- mini pipeline -->
  <g font-size="10.5">
    <rect x="86" y="446" width="118" height="30" rx="7" fill="#434C5E" stroke="#81A1C1" stroke-width="1"/><text x="145" y="465" text-anchor="middle" fill="#E5E9F0">BASELINE</text>
    <path d="M205,461 L228,461" stroke="#88C0D0" stroke-width="1.5" marker-end="url(#ar)"/>
    <rect x="230" y="446" width="118" height="30" rx="7" fill="#434C5E" stroke="#EBCB8B" stroke-width="1"/><text x="289" y="465" text-anchor="middle" fill="#E5E9F0">ACT · one edit</text>
    <path d="M349,461 L372,461" stroke="#88C0D0" stroke-width="1.5" marker-end="url(#ar)"/>
    <rect x="374" y="446" width="150" height="30" rx="7" fill="#434C5E" stroke="#A3BE8C" stroke-width="1"/><text x="449" y="465" text-anchor="middle" fill="#E5E9F0">OBSERVE + SCORE</text>
    <path d="M525,461 L548,461" stroke="#88C0D0" stroke-width="1.5" marker-end="url(#ar)"/>
    <rect x="550" y="446" width="118" height="30" rx="7" fill="#434C5E" stroke="#81A1C1" stroke-width="1"/><text x="609" y="465" text-anchor="middle" fill="#E5E9F0">KEEP-BEST</text>
    <path d="M669,461 L692,461" stroke="#88C0D0" stroke-width="1.5" marker-end="url(#ar)"/>
    <rect x="694" y="446" width="128" height="30" rx="7" fill="#434C5E" stroke="#81A1C1" stroke-width="1.6"/><text x="758" y="465" text-anchor="middle" fill="#ECEFF4" font-weight="700">GATE</text>
    <!-- running loops back -->
    <path d="M758,476 L758,492 L289,492 L289,478" fill="none" stroke="#88C0D0" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
    <text x="523" y="489" text-anchor="middle" font-size="9.5" fill="#88C0D0">running · score &lt; target → loop back to ACT</text>
  </g>
  <text x="86" y="513" font-size="11" fill="#CED4DE">GATE verdicts: <tspan fill="#BF616A">error</tspan> › <tspan fill="#A3BE8C">done</tspan> › <tspan fill="#EBCB8B">capped</tspan> › <tspan fill="#D08770">plateau</tspan> › <tspan fill="#88C0D0">running</tspan>   ·   only running loops back · done-edge confirm-veto + stability re-check</text>
  <text x="86" y="525" font-size="10.5" fill="#9AA5B8">plateau → one opus rescue, then it stands · two budget dials (USD + tokens), checked after each pass · no-op guard · crash-resume</text>

  <!-- ===== SCORERS & ISOLATION ===== -->
  <rect x="68" y="540" width="852" height="92" rx="11" fill="#363D4A" stroke="#4C566A" stroke-width="1.3"/>
  <text x="86" y="563" font-size="14.5" font-weight="700" fill="#ECEFF4">SCORERS &amp; ISOLATION</text>
  <text x="278" y="563" font-size="11" fill="#9AA5B8">scorers/ — the 0–100 number the gate reads, at every layer</text>
  <circle cx="92" cy="582" r="4.5" fill="#A3BE8C"/><text x="103" y="586" font-size="11" fill="#CED4DE">objective (code): test-pass-rate · contains · floor · doc-lint · io-assert / io-trace / io-invariant / io-effect</text>
  <circle cx="92" cy="600" r="4.5" fill="#A3BE8C"/><text x="103" y="604" font-size="11" fill="#CED4DE">subjective: llm-judge (opus, nonce-fenced) · composite = min-combine N → done only when the weakest dimension clears target</text>
  <circle cx="92" cy="618" r="4.5" fill="#81A1C1"/><text x="103" y="622" font-size="11" fill="#CED4DE">io-* run untrusted candidate code in a locked-down out-of-process child — denies v8 / vm / child_process · canonical JSON · nonce frame</text>

  <!-- score feeds the gate -->
  <path d="M824,555 C868,548 872,500 840,478" fill="none" stroke="#A3BE8C" stroke-width="1.4" marker-end="url(#ag)"/>
  <text x="884" y="520" font-size="9.5" fill="#A3BE8C" text-anchor="middle" transform="rotate(90 884 520)">score → gate</text>

  <!-- footer -->
  <rect x="34" y="648" width="932" height="50" rx="10" fill="#333A48" stroke="#3B4252"/>
  <rect x="34" y="648" width="6" height="50" rx="3" fill="#81A1C1"/>
  <text x="54" y="670" font-size="11.5" fill="#D8DEE9">Every layer reuses the SAME code-owned gate. The <tspan fill="#A3BE8C">scorer</tspan> owns the number · the <tspan fill="#EBCB8B">model</tspan> owns the edit · <tspan fill="#81A1C1">code</tspan> owns “done”.</text>
  <text x="54" y="688" font-size="11" fill="#9AA5B8">The model literally cannot vote itself done — the  score ≥ target  branch lives in gate.mjs, not in a prompt.</text>
</g>
</svg>
